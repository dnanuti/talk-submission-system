spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
  h2:
    console:
      enabled: true

openai:
  api-key: ${OPENAI_API_KEY:your-key-here}

gemini:
  api-key: ${GEMINI_API_KEY:your-key-here}
